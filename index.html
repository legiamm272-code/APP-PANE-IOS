<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZIKOSI RED - CONFIG EDITION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff003c;
            --primary-glow: rgba(255, 0, 60, 0.5);
            --bg-dark: #050507;
            --panel-bg: rgba(10, 10, 15, 0.98);
            --text-main: #ffffff;
            --text-dim: #888fb1;
            --success: #00ffa3;
        }

        /* NỀN TẢNG */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Rajdhani', sans-serif;
            background: radial-gradient(circle at center, #1a050a 0%, #050507 100%);
        }

        .wrapper { position: relative; z-index: 10; width: 92%; max-width: 380px; }

        .glass-panel {
            background: var(--panel-bg);
            border-radius: 30px;
            border: 2px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            overflow: hidden;
            transition: 0.5s;
        }

        /* --- 1. LOGIN & LOADING SCREEN --- */
        #login-box { padding: 50px 30px; text-align: center; }
        .logo-box { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .radar { position: absolute; inset: 0; border: 2px solid var(--primary); border-radius: 50%; animation: pulse 2s infinite; opacity: 0; }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .logo-svg { width: 70px; height: 70px; filter: drop-shadow(0 0 10px var(--primary)); z-index: 2; }

        .input-key {
            width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 60, 0.2); border-radius: 12px;
            color: #fff; font-family: 'Orbitron'; font-size: 13px;
            text-align: center; outline: none; transition: 0.4s; margin-bottom: 20px;
        }
        .btn-login {
            width: 100%; padding: 18px; background: transparent; border: 2px solid var(--primary); border-radius: 12px;
            color: #fff; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }
        .btn-login:hover { background: var(--primary); box-shadow: 0 0 25px var(--primary-glow); }

        #loading-container { display: none; margin-top: 20px; }
        .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* --- 2. MAIN MENU SCREEN --- */
        #main-menu { display: none; }

        .admin-section { padding: 25px 20px 15px; text-align: center; background: linear-gradient(180deg, rgba(255,0,60,0.15) 0%, transparent 100%); }
        .admin-avatar-wrapper { position: relative; width: 80px; height: 80px; margin: 0 auto 10px; }
        .admin-avatar-wrapper::before { content: ''; position: absolute; inset: -5px; border: 2px solid var(--primary); border-radius: 22px; animation: rotate 4s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .admin-avatar { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; border: 2px solid #000; }

        /* CONFIG FILE AREA */
        .config-box {
            margin: 0 20px 15px; padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px; border: 1px dashed rgba(255, 0, 60, 0.5);
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .config-box:hover { background: rgba(255, 0, 60, 0.05); }
        .config-name { font-size: 11px; color: var(--success); font-family: 'Orbitron'; margin-top: 5px; display: block; }

        /* MONITORING */
        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 15px; }
        .monitor-card { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .monitor-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
        .monitor-val { font-family: 'Orbitron'; font-size: 11px; color: var(--primary); float: right; }
        .monitor-bar-bg { width: 100%; height: 3px; background: #222; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .monitor-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }

        /* SCROLL AREA */
        .scroll-area { max-height: 320px; overflow-y: auto; padding: 0 20px 20px; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }
        .group-title { font-size: 10px; color: var(--primary); font-weight: 700; margin: 15px 0 8px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .group-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,0,60,0.1); }

        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: rgba(255, 255, 255, 0.02); border-radius: 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .feat-info span { display: block; font-size: 13px; font-weight: 600; }
        .feat-info small { font-size: 9px; color: var(--text-dim); }

        /* SWITCH */
        .switch { position: relative; width: 38px; height: 19px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 20px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 13px; width: 13px; left: 3px; bottom: 3px; background: #fff; transition: 0.4s; border-radius: 50%; }
        input:checked + .slider { background: var(--primary); }
        input:checked + .slider:before { transform: translateX(19px); }

        .btn-launch { width: calc(100% - 40px); margin: 0 auto 20px; display: block; padding: 16px; background: var(--primary); border: none; border-radius: 15px; color: #fff; font-weight: 700; font-family: 'Orbitron'; cursor: pointer; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 700; display: none; z-index: 99; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="login-box" class="glass-panel">
            <div class="logo-box">
                <div class="radar"></div>
                <div class="logo-svg">
                    <svg viewBox="0 0 100 100"><path d="M50 10 L90 80 L10 80 Z" fill="none" stroke="#ff003c" stroke-width="4"/><circle cx="50" cy="58" r="10" fill="#ff003c"/></svg>
                </div>
            </div>
            <h2 style="font-family: 'Orbitron'; color: var(--primary);">ZIKOSI RED</h2>
            <p style="font-size: 10px; color: var(--text-dim); letter-spacing: 4px; margin-bottom: 30px;">ELITE SYSTEM</p>
            <input type="text" id="keyInput" class="input-key" placeholder="ACCESS KEY...">
            <button class="btn-login" onclick="startLoading()">LOGIN</button>
            <div id="loading-container">
                <span class="percent-txt" id="percent-val">0%</span>
                <div class="progress-bg"><div class="progress-bar" id="p-bar"></div></div>
            </div>
        </div>

        <div id="main-menu" class="glass-panel">
            <div class="admin-section">
                <div class="admin-avatar-wrapper">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQR-PnYSckFBSTJb3sNoyqkcLuUrsq2iiuMPg&s" class="admin-avatar">
                </div>
                <h2 style="font-family: 'Orbitron'; font-size: 16px;">ADMIN ZIKOSI</h2>
            </div>

            <div class="config-box" onclick="document.getElementById('fileInput').click()">
                <span style="font-size: 10px; color: var(--text-dim);">LOAD CUSTOM CONFIG (.dlack)</span>
                <span id="fileName" class="config-name">No file selected</span>
                <input type="file" id="fileInput" style="display:none" accept=".dlack" onchange="handleFile(this)">
            </div>

            <div class="monitor-grid">
                <div class="monitor-card"><span class="monitor-label">CPU</span><span class="monitor-val" id="m-cpu">0%</span><div class="monitor-bar-bg"><div class="monitor-bar-fill" id="b-cpu"></div></div></div>
                <div class="monitor-card"><span class="monitor-label">RAM</span><span class="monitor-val" id="m-ram">0%</span><div class="monitor-bar-bg"><div class="monitor-bar-fill" id="b-ram"></div></div></div>
            </div>

            <div class="scroll-area">
                <div class="group-title">Elite Aiming</div>
                <div class="feature-item">
                    <div class="feat-info"><span>Auto Aim Lock</span><small>Khóa tâm mục tiêu</small></div>
                    <label class="switch"><input type="checkbox" onchange="nt('Aim Lock', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="feature-item">
                    <div class="feat-info"><span>Headshot Magic</span><small>Tăng tỷ lệ Headshot</small></div>
                    <label class="switch"><input type="checkbox" onchange="nt('Headshot', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="feature-item">
                    <div class="feat-info"><span>Aim Smooth</span><small>Di tâm mượt mà</small></div>
                    <label class="switch"><input type="checkbox" onchange="nt('Smooth', this.checked)"><span class="slider"></span></label>
                </div>

                <div class="group-title">System Support</div>
                <div class="feature-item">
                    <div class="feat-info"><span>Bypass Security</span><small>Chống phát hiện</small></div>
                    <label class="switch"><input type="checkbox" onchange="nt('Bypass', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="feature-item">
                    <div class="feat-info"><span>Ultra 120 FPS</span><small>Tối ưu mượt game</small></div>
                    <label class="switch"><input type="checkbox" onchange="nt('FPS Boost', this.checked)"><span class="slider"></span></label>
                </div>
            </div>

            <button class="btn-launch" onclick="window.location.href='freefire://'">LAUNCH GAME</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        function startLoading() {
            if(!document.getElementById('keyInput').value) return alert("Nhập Key!");
            document.getElementById('input-area')?.style.setProperty('display','none');
            document.getElementById('loading-container').style.display = 'block';
            let p = 0;
            let timer = setInterval(() => {
                p += Math.floor(Math.random()*10)+2;
                if(p >= 100) {
                    p = 100; clearInterval(timer);
                    document.getElementById('login-box').style.display = 'none';
                    document.getElementById('main-menu').style.display = 'block';
                    startMonitor();
                }
                document.getElementById('p-bar').style.width = p + "%";
                document.getElementById('percent-val').innerText = p + "%";
            }, 80);
        }

        // XỬ LÝ FILE .DLACK
        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                if (file.name.endsWith('.dlack')) {
                    document.getElementById('fileName').innerText = "LOADED: " + file.name;
                    showToast("Config '" + file.name + "' applied!");
                } else {
                    alert("Chỉ chấp nhận file đuôi .dlack");
                    input.value = "";
                }
            }
        }

        function startMonitor() {
            setInterval(() => {
                let c = Math.floor(Math.random()*20)+30;
                let r = Math.floor(Math.random()*15)+50;
                document.getElementById('m-cpu').innerText = c + "%";
                document.getElementById('b-cpu').style.width = c + "%";
                document.getElementById('m-ram').innerText = r + "%";
                document.getElementById('b-ram').style.width = r + "%";
            }, 2000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function nt(name, state) {
            showToast((state ? "BẬT: " : "TẮT: ") + name);
        }
    </script>
</body>
</html>
